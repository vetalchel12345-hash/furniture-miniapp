<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оформление заказа</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="theme-light">
  <div class="app-shell">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <main class="page checkout-page-premium">
      <section class="cart-hero glass glass-strong">
        <div class="cart-top-row">
          <button class="icon-btn back-btn" onclick="history.back()">←</button>
          <div>
            <div class="eyebrow">Оформление</div>
            <h1 class="cart-title">Оформление заказа</h1>
          </div>
        </div>
      </section>

      <section id="checkout-preview" class="cart-list"></section>

      <section class="cart-contact glass glass-strong">
        <div class="eyebrow">Контакты</div>
        <h2 class="cart-contact-title">Данные покупателя</h2>

        <div class="cart-contact-grid">
          <input id="cart-name" class="input" placeholder="Ваше имя" />
          <input id="cart-phone" class="input" placeholder="Телефон" />
          <input id="cart-city" class="input" placeholder="Город" />
          <input id="cart-contact-method" class="input" placeholder="WhatsApp / Telegram / звонок" />
        </div>

        <textarea id="cart-comment" class="textarea" placeholder="Комментарий к заказу"></textarea>
      </section>

      <section class="cart-delivery glass glass-strong">
        <div class="eyebrow">Доставка</div>
        <h2 class="cart-contact-title">Параметры доставки</h2>

        <div class="cart-contact-grid">
          <select id="cart-delivery-type" class="input">
            <option value="Самовывоз">Самовывоз</option>
            <option value="Доставка до подъезда">Доставка до подъезда</option>
            <option value="Доставка в квартиру">Доставка в квартиру</option>
            <option value="Доставка + сборка">Доставка + сборка</option>
          </select>

          <input id="cart-address" class="input" placeholder="Адрес доставки" />
          <input id="cart-floor" class="input" placeholder="Этаж" />
          <input id="cart-lift" class="input" placeholder="Лифт: да / нет" />
        </div>
      </section>

      <section class="cart-summary glass glass-strong">
        <div class="cart-summary-row">
          <span>Выбрано товаров</span>
          <strong id="checkout-count">0</strong>
        </div>
        <div class="cart-summary-row">
          <span>Итого</span>
          <strong id="checkout-total">0 ₽</strong>
        </div>
        <div class="cart-summary-actions">
          <button id="checkout-button" class="primary-btn">Заказать</button>
        </div>
      </section>
    </main>

    <div id="app-toast" class="app-toast"></div>

    <nav class="app-bottom-nav glass glass-strong">
      <div class="app-bottom-nav-side left">
        <a href="./catalog.html" class="nav-item">
          <span>☰</span>
          <span>Каталог</span>
        </a>
        <a href="./favorites.html" class="nav-item nav-favorites-link">
          <span>♡</span>
          <span>Избранное</span>
        </a>
      </div>

      <a href="./index.html" class="nav-home">
        <span>⌂</span>
        <span>Главная</span>
      </a>

      <div class="app-bottom-nav-side right">
        <a href="./cart.html" class="nav-item active nav-cart-link">
          <span>🛒</span>
          <span>Корзина</span>
        </a>
        <a href="./profile.html" class="nav-item">
          <span>◌</span>
          <span>Профиль</span>
        </a>
      </div>
    </nav>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./js/telegram.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
